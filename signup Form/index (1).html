<!DOCTYPE html>
<!-- Coding By CodingNepal - www.codingnepalweb.com -->
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Sign-Up Form </title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="wrapper">
    <form action="Home-page/index.html" method="post" target="_blank">
      <h2>SignUp</h2>
      <div class="input-field">
        <input type="text" required>
        <label>First-Name</label>
      </div>
      <div class="input-field">
        <input type="text" required>
        <label>Last-Name</label>
      </div>
      <div class="input-field" id="date-field">
        <input type="date" required>
        <label>Date of Birth</label>
      </div>
      <div class="input-field">
        <input type="text" required>
        <label>Enter your email</label>
      </div>
      <div class="input-field">
        <input type="password" required>
        <label>Enter your new password</label>
      </div>
      <div class="input-field">
        <input type="password" required>
        <label>Rewrite your password</label>
      </div>
      <div class="gender">
        <span style="font-size: 20px; margin-right:10px;">Gender:</span>
        <input type="radio" name="gender" id="male" style="margin-right: 10px;">
        <label>male</label>
        <input type="radio" name="gender" id="female" style="margin-left: 10px;">
        <label>female</label>
      </div>

      <button type="submit">Sign Up</button>
      <div class="register">
        <p>have an account? <a href="../index.html" target="_blank">Login</a></p>
      </div>
    </form>
  </div>
</body>

</html>
